spring:
  application:
    name: auth-manager
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

# Other services (resource servers) can use:
#   spring.security.oauth2.resourceserver.jwt.jwk-set-uri: http://auth-manager:8080/.well-known/jwks.json
# (host/port/path to reach this app from that network.)

app:
  jwt:
    issuer: auth-manager
    # Published in JWT header and at GET /.well-known/jwks.json; change when rotating keys.
    key-id: auth-manager-key-1
    access-token-ttl: PT15M
    refresh-token-ttl: PT15M
    rsa:
      # From .env / environment (no file). Prefer JWT_RSA_PRIVATE_KEY_B64 for a single-line secret.
      private-key-pem: ${JWT_RSA_PRIVATE_KEY:}
      private-key-pem-base64: ${JWT_RSA_PRIVATE_KEY_B64:}
  webauthn:
    rp-id: localhost
    rp-name: distributed-chat
    origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:8080
    ceremony-ttl: PT5M
