spring:
  application:
    name: auth-manager
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

app:
  jwt:
    issuer: auth-manager
    key-id: auth-manager-key-1
    access-token-ttl: PT8H
    rsa:
      private-key-pem: ${JWT_RSA_PRIVATE_KEY:}
      private-key-pem-base64: ${JWT_RSA_PRIVATE_KEY_B64:}
  webauthn:
    rp-id: localhost
    rp-name: distributed-chat
    origins:
      - http://localhost:8080
      - http://127.0.0.1:8080
    ceremony-ttl: PT5M
