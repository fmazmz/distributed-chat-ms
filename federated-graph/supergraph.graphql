type DailyStat
  @join__type(graph: ANALYTICS, key: "date")
{
  date: Date!
  messageCount: Int!
}

scalar Date
  @join__type(graph: ANALYTICS)

scalar join__FieldSet

enum join__Graph {
  ANALYTICS @join__graph(name: "analytics", url: "http://127.0.0.1:8084/graphql")
  MESSAGES @join__graph(name: "messages", url: "http://127.0.0.1:8083/graphql")
  USERS @join__graph(name: "users", url: "http://127.0.0.1:8082/graphql")
