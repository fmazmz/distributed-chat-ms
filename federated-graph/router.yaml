supergraph:
  listen: 0.0.0.0:4000
  path: /graphql
  introspection: true

sandbox:
  enabled: true

homepage:
  enabled: false

include_subgraph_errors:
  all: true

health_check:
  listen: 0.0.0.0:8088

headers:
  all:
    request:
      - propagate:
          named: Authorization

cors:
  policies:
    - origins:
        - http://localhost:8080
        - http://localhost:4000
      allow_credentials: true
