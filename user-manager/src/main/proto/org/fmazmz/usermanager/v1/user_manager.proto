syntax = "proto3";

package org.fmazmz.usermanager.v1;

option java_multiple_files = true;
option java_package = "org.fmazmz.usermanager.grpc.v1";
option java_outer_classname = "UserManagerProto";

// User read API for inter-service calls. Keep in sync with REST user details where applicable.
service UserManager {
  // Returns basic user details for the given id (UUID string).
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
  // Same as UserDetailsRequest.id: RFC 4122 UUID string.
  string id = 1;
}

message GetUserResponse {
  // Same as UserDetailsResponse.userName
  string user_name = 1;
}
