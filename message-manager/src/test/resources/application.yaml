messagemanager:
  user-grpc:
    validate-sender: false

spring:
  datasource:
    url: jdbc:h2:mem:message_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      resourceserver:
        jwt:
          # JwtConfig requires this property; tests do not call a real auth server.
          jwk-set-uri: http://127.0.0.1:1/.well-known/jwks.json
