spring:
  application:
    name: message-manager
  grpc:
    client:
      channels:
        user-manager:
          address: static://${USER_MANAGER_GRPC_HOST:user-manager}:${USER_MANAGER_GRPC_PORT:9090}
          negotiation-type: plaintext
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-manager:8080/.well-known/jwks.json
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/message_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:9092
    topic-name: message-published
    consumer:
      group-id: message-manager-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: org.fmazmz.messagemanager
        # No type headers from producer; fix target type when you add @KafkaListener consumers.
        spring.json.value.default.type: org.fmazmz.messagemanager.event.MessageSentEvent
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false
server:
  port: ${SERVER_PORT:8080}

messagemanager:
  user-grpc:
    # When true, POST /messages checks User Service via gRPC before persisting.
    validate-sender: ${MESSAGEMANAGER_USER_GRPC_VALIDATE_SENDER:true}
