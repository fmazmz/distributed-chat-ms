# Apply with:
#   minikube kubectl -- apply -f k8s/minikube/all.yaml
# Images must exist in the Docker daemon.
#
# Databases (this file): one Postgres Deployment + Service per app (user, message, auth).
# JDBC URLs use separate in-cluster DNS: postgres-user, postgres-message, postgres-auth.
# Kafka: single-node KRaft broker; message-manager publishes to topic `message-published`.
# Same Secret password for simplicity; use distinct Secrets in production.
#
# BFF: single browser-facing HTTP entry (register/login/messages/me). Build image bff:local and add to deploy-minikube.sh loop.
# SPA WebSocket URL env matches port-forward example for message-manager (see bff Deployment MESSAGE_MANAGER_WEBSOCKET_URL).
#
# JWT for auth-manager in a real cluster: create a secret before apply, e.g.
#   openssl genpkey -algorithm RSA -out /tmp/jwt.pem -pkeyopt rsa_keygen_bits:2048
#   kubectl create secret generic auth-manager-jwt \
#     --from-literal=jwt-rsa-pem-b64="$(base64 -w0 /tmp/jwt.pem)" --dry-run=client -o yaml | minikube kubectl -- apply -f -
# Then set env JWT_RSA_PRIVATE_KEY_B64 from that secret (see auth-manager Deployment below).
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
stringData:
  password: root
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-user
  template:
    metadata:
      labels:
        app: postgres-user
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: root
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: user_db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-user
spec:
  selector:
    app: postgres-user
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-message
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-message
  template:
    metadata:
      labels:
        app: postgres-message
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: root
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: message_db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-message
spec:
  selector:
    app: postgres-message
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-auth
  template:
    metadata:
      labels:
        app: postgres-auth
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: root
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: auth_db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-auth
spec:
  selector:
    app: postgres-auth
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.1.1
          ports:
            - containerPort: 9092
            - containerPort: 29093
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
          env:
            - name: CLUSTER_ID
              value: "4L6g3nShT-eMCtK--X86sw"
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_LISTENERS
              value: "CONTROLLER://0.0.0.0:29093,PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # Controller must reach itself on loopback inside the pod — using kafka:29093 hits
            # ClusterIP and often fails (hairpin / unreachable controller from same pod).
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@127.0.0.1:29093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_DIRS
              value: "/tmp/kraft-combined-logs"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-manager
  template:
    metadata:
      labels:
        app: user-manager
    spec:
      containers:
        - name: app
          image: user-manager:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
            - containerPort: 9090
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-user:5432/user_db
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: user-manager
spec:
  selector:
    app: user-manager
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-manager
  template:
    metadata:
      labels:
        app: auth-manager
    spec:
      containers:
        - name: app
          image: auth-manager:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DATASOURCE_URL
              value: jdbc:postgresql://postgres-auth:5432/auth_db
            - name: DATASOURCE_USERNAME
              value: root
            - name: DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            # Optional stable signing key (omit for ephemeral RSA on each pod restart):
            # kubectl create secret generic auth-manager-jwt \
            #   --from-literal=jwt-rsa-pem-b64="$(base64 -w0 jwt-rsa.pem)" --dry-run=client -o yaml | kubectl apply -f -
            # Then uncomment:
            # - name: JWT_RSA_PRIVATE_KEY_B64
            #   valueFrom:
            #     secretKeyRef:
            #       name: auth-manager-jwt
            #       key: jwt-rsa-pem-b64
---
apiVersion: v1
kind: Service
metadata:
  name: auth-manager
spec:
  selector:
    app: auth-manager
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-manager
  template:
    metadata:
      labels:
        app: message-manager
    spec:
      containers:
        - name: app
          image: message-manager:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 2
            failureThreshold: 30
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-message:5432/message_db
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: USER_MANAGER_GRPC_HOST
              value: user-manager
            - name: USER_MANAGER_GRPC_PORT
              value: "9090"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: message-manager
spec:
  selector:
    app: message-manager
  ports:
    - name: http
      port: 8080
      targetPort: 8080
